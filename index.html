<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PlantSomeSeeds</title>
    <style>
      :root{
        --ground: #e9f5ea;
      }
      html,body{
        height:100%;
        margin:0;
      }
      body {
        font-family: system-ui, sans-serif;
        background: linear-gradient(#f6fbf6, var(--ground));
        overflow:hidden;
      }
      .stage{
        position:relative;
        width:100%;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
      }
      /* planting button centered */
      .plant-button{
        background: linear-gradient(135deg,#8b5a2b,#c29367);
        border: 4px solid rgba(0,0,0,0.14);
        box-shadow: 0 10px 28px rgba(0,0,0,0.16);
        color: #fff;
        font-size:18px;
        width:220px;
        height:72px;
        padding:0;
        border-radius:999px;
        cursor:pointer;
        transition: background .12s ease, transform .08s ease, box-shadow .12s ease;
        user-select:none;
        position:relative;
        display:flex;
        align-items:center;
        justify-content:center;
      }
      .plant-button::before{
        content:'';
        position:absolute;
        width:96px;
        height:52px;
        background: radial-gradient(circle at 30% 35%, #f6dfb2, #8b5a2b);
        border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
        box-shadow: inset 0 2px 8px rgba(255,255,255,0.35);
      }
      .plant-button span{
        position:relative;
        z-index:1;
      }
      .plant-button:active{ transform:translateY(2px); box-shadow: 0 6px 18px rgba(0,0,0,0.12); }

      /* seed */
      .seed{
        position:fixed;
        width:18px;
        height:12px;
        background: linear-gradient(90deg,#6b3b1a,#8b5a2b);
        border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
        transform-origin:center;
        z-index:20;
        pointer-events:none;
      }

      .plant{
        position:absolute;
        bottom:2vh;
        width:100px;
        height:140px;
        display:flex;
        flex-direction:column;
        justify-content:flex-end;
        align-items:center;
        pointer-events:none;
      }

      .bee .weapon-icon{
        position:absolute;
        width:26px;
        height:26px;
        right:-10px;
        bottom:-10px;
        border-radius:12px;
        background: rgba(255,255,255,0.78);
        box-shadow:0 2px 8px rgba(0,0,0,0.18);
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:16px;
        opacity:0.88;
      }

      .weapon-menu{
        position:fixed;
        top:16px;
        right:16px;
        display:flex;
        gap:10px;
        padding:10px 12px;
        background:rgba(255,255,255,0.92);
        border:1px solid rgba(0,0,0,0.12);
        border-radius:18px;
        box-shadow:0 12px 30px rgba(0,0,0,0.12);
        z-index:130;
        align-items:center;
      }
      .weapon-menu::before{
        content:'Weapons';
        position:absolute;
        top:-16px;
        right:14px;
        font-size:12px;
        color:#444;
        background:rgba(255,255,255,0.95);
        padding:0 6px;
      }
      .weapon-slot{
        width:42px;
        height:42px;
        border-radius:14px;
        background:rgba(255,255,255,0.96);
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:20px;
        cursor:pointer;
        user-select:none;
        border:2px solid transparent;
        transition: transform .15s ease, border-color .15s ease, background .15s ease;
      }
      .weapon-slot:hover{ transform:translateY(-2px); background:rgba(250,250,250,1); }
      .weapon-slot.selected{ border-color:#4caf50; box-shadow:0 8px 18px rgba(76,175,80,0.18); }
      .weapon-slot span{ pointer-events:none; }

      .cursor-weapon{
        position:fixed;
        width:38px;
        height:38px;
        border-radius:18px;
        pointer-events:none;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:20px;
        background: rgba(255,255,255,0.9);
        box-shadow:0 12px 26px rgba(0,0,0,0.18);
        transform: translate(-50%, -50%) rotate(20deg);
        z-index:150;
      }
      .cursor-weapon.hidden{ display:none; }
      .cursor-weapon::after{
        content:'';
        position:absolute;
        width:6px;
        height:18px;
        background:rgba(0,0,0,0.14);
        border-radius:3px;
        bottom:-8px;
      }

      @keyframes fall {
        to { transform: translateY(var(--landY)); opacity:1 }
      }

      /* plant (growing) */
      .plant{
        position:absolute;
        bottom:6vh;
        width:100px;
        height:140px;
        display:flex;
        flex-direction:column;
        justify-content:flex-end;
        align-items:center;
        pointer-events:none;
      }
      .bloom{
        position:relative;
        width:140px;
        height:120px;
        border-radius:8px;
        overflow:hidden;
        display:flex;
        justify-content:center;
        align-items:center;
        transform:scale(0);
        box-shadow:0 6px 18px rgba(0,0,0,0.12);
        background: transparent;
      }
      .decay-overlay{
        position:absolute;
        inset:0;
        background: rgba(40,20,10,0);
        opacity:0;
        pointer-events:none;
      }
      .bloom-img{
        width:100%;
        height:100%;
        object-fit:contain;
        display:block;
        background:transparent;
        transform:scale(0);
        transition: transform .3s linear;
      }
      .flower-name{
        position:absolute;
        bottom:120%;
        left:50%;
        transform:translateX(-50%);
        font-size:14px;
        text-decoration:none;
        color: #fff;
        text-shadow: 0 2px 6px rgba(0,0,0,0.6);
        pointer-events:auto;
        text-align:center;
        line-height:1.1;
      }
      .flower-name .title{ font-weight:700; display:block; }
      .flower-name .fun{ font-weight:400; display:block; font-size:13px; opacity:0.95 }
      .bee{
        position:fixed;
        width:28px;
        height:24px;
        background: linear-gradient(90deg, #ffe066 40%, #000 40%, #000 60%, #ffe066 60%);
        border-radius:50% 50% 45% 45%;
        box-shadow:0 2px 8px rgba(0,0,0,0.25);
        z-index:30;
        pointer-events:none;
        transform:translate(-50%,-50%) rotate(0deg);
      }
      .bee::before{
        content:'';
        position:absolute;
        left:50%;
        top:20%;
        width:18px;
        height:16px;
        background:rgba(255,255,255,0.9);
        border-radius:50%;
        transform:translateX(-50%);
      }
      .bee.warrior{
        box-shadow:0 2px 14px rgba(255,140,0,0.45);
      }
      .bee .weapon-icon{
        position:absolute;
        width:16px;
        height:16px;
        right:-6px;
        bottom:-4px;
        border-radius:50%;
        background:#fff;
        padding:2px;
        box-shadow:0 2px 6px rgba(0,0,0,0.2);
      }
      .hive{
        position:absolute;
        width:80px;
        height:60px;
        background:transparent;
        overflow:visible;
        display:flex;
        justify-content:center;
        align-items:center;
        pointer-events:none;
      }
      .hive img{
        width:100%;
        height:100%;
        display:block;
        position:relative;
        z-index:2;
      }
      .hive-bee{
        position:absolute;
        width:18px;
        height:16px;
        background: linear-gradient(90deg, #ffe066 40%, #000 40%, #000 60%, #ffe066 60%);
        border-radius:50% 50% 45% 45%;
        box-shadow:0 1px 5px rgba(0,0,0,0.2);
        pointer-events:none;
        top:24px;
        left:40px;
        transform: translate(-50%, -50%);
        z-index:1;
      }
      .hive-bee.front{
        z-index:3;
      }
      .hive .health-bar{
        position:absolute;
        left:50%;
        bottom:108%;
        transform:translateX(-50%);
        width:72px;
        height:10px;
        background: rgba(255,255,255,0.9);
        border:1px solid rgba(0,0,0,0.12);
        border-radius:999px;
        overflow:hidden;
      }
      .hive .health-fill{
        width:100%;
        height:100%;
        background: linear-gradient(90deg, #4caf50, #8bc34a);
        transition: width .2s ease;
      }
      .health-bar{
        position:absolute;
        left:50%;
        transform:translateX(-50%);
        bottom:100%;
        width:52px;
        height:8px;
        background: rgba(255,255,255,0.8);
        border:1px solid rgba(0,0,0,0.12);
        border-radius:999px;
        overflow:hidden;
        margin-bottom:6px;
      }
      .health-fill{
        width:100%;
        height:100%;
        background: linear-gradient(90deg, #4caf50, #8bc34a);
        transition: width .2s ease;
      }
      .poll-meter{
        position:fixed;
        top:16px;
        left:16px;
        display:flex;
        align-items:center;
        gap:10px;
        background:rgba(255,255,255,0.92);
        border:1px solid rgba(0,0,0,0.12);
        border-radius:999px;
        padding:10px 14px;
        box-shadow:0 12px 30px rgba(0,0,0,0.12);
        z-index:120;
        font-weight:700;
      }
      .poll-icon{
        font-size:20px;
      }
      .attack-effect, .explosion{
        position:absolute;
        pointer-events:none;
        border-radius:50%;
        opacity:0.95;
        transform:translate(-50%,-50%);
      }
      .attack-effect{
        width:14px;
        height:14px;
        background:rgba(255,255,255,0.9);
        box-shadow:0 0 10px rgba(255,255,255,0.9);
      }
      .explosion{
        width:0;
        height:0;
        background:rgba(255,190,0,0.9);
        box-shadow:0 0 20px rgba(255,120,0,0.9);
      }
      .wasp{
        position:fixed;
        width:30px;
        height:24px;
        background: linear-gradient(90deg,#000 30%,#ffe066 30%,#ffe066 50%,#000 50%,#000 70%,#ffe066 70%);
        border-radius:50% 50% 45% 45%;
        box-shadow:0 3px 12px rgba(0,0,0,0.3);
        transform:translate(-50%,-50%) rotate(0deg);
        z-index:40;
        pointer-events:none;
      }
      .wasp::before{
        content:'';
        position:absolute;
        left:50%;
        top:12%;
        width:8px;
        height:10px;
        background:#000;
        border-radius:50%;
        transform:translateX(-50%);
      }
      .wasp::after{
        content:'';
        position:absolute;
        right:-4px;
        top:40%;
        width:6px;
        height:6px;
        background:#000;
        border-radius:50% 50% 50% 0;
        transform:rotate(30deg);
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <button id="plantBtn" class="plant-button"><span>🌱</span></button>
    </div>
    <div class="poll-meter" aria-label="Poll-o-meter">
      <span class="poll-icon">🌼</span>
      <span id="pollCount">0</span>
    </div>
    <div class="weapon-menu" id="weaponMenu" aria-label="Weapon menu"></div>
    <div class="cursor-weapon hidden" id="cursorWeapon" aria-hidden="true"></div>

    <script>
      // Minimal embedded list of 100 flower names (links built to Wikipedia)
      const flowers = [
        'Rose','Tulip','Sunflower','Daisy','Orchid','Lily','Daffodil','Marigold','Chrysanthemum','Iris',
        'Peony','Carnation','Hyacinth','Lotus','Poppy','Jasmine','Lavender','Azalea','Begonia','Zinnia',
        'Snapdragon','Gladiolus','Anemone','Aster','Freesia','Geranium','Gardenia','Camellia','Magnolia','Hibiscus',
        'Fuchsia','Petunia','Ranunculus','Salvia','Sweet_pea','Verbena','Phlox','Yarrow','Nigella','Impatiens',
        'Columbine','Larkspur','Coneflower','Forget-me-not','Morning_glory','Heliotrope','Calendula','Coreopsis','Lobelia','Rudbeckia',
        'Scabiosa','Statice','Tuberose','Waxflower','Dianthus','Calla_lily','Bleeding_heart','Buttercup','Canna','Canterbury_bell',
        'Chocolate_cosmos','Clarkia','Cosmos','Crocus','Cyclamen','Echinacea','Gazania','Hellebore','Liatris','Lupin',
        'Mallow','Monkshood','Nasturtium','Oleander','Pansy','Peony','Plumeria','Primrose','Rhododendron','Rosemary',
        'Sea_holly','Shasta_daisy','Stephanotis','Sunflower','Sweet_william','Tansy','Verbascum','Violet','Wisteria','Zinnia',
        'Foxglove','Japanese_anemone','Ranunculus','Bottlebrush','Garden_phlox','Autumn_crocus','Bottle_gentian','Colchicum','Dutch_iris','Evening_primrose'
      ].slice(0,100);

      // Photo URLs for different flower varieties (used for blooms)
      const flowerPNGs = [
        'https://img.icons8.com/emoji/256/sunflower-emoji.png',
        'https://img.icons8.com/emoji/256/hibiscus-emoji.png',
        'https://img.icons8.com/emoji/256/rose-emoji.png',
        'https://img.icons8.com/emoji/256/tulip-emoji.png',
        'https://img.icons8.com/emoji/256/blossom-emoji.png',
        'https://img.icons8.com/emoji/256/cherry-blossom-emoji.png',
        'https://img.icons8.com/emoji/256/potted-plant-emoji.png',
        'https://img.icons8.com/emoji/256/white-flower-emoji.png'
      ];
      // placeholder PNG (small data URI, 1x1 transparent PNG fallback)
      const placeholderPng = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAASsJTYQAAAAASUVORK5CYII=';

      // fetch a PNG thumbnail from Wikipedia if available
      async function fetchFlowerThumbnail(name){
        try{
          const base = 'https://en.wikipedia.org/w/api.php?origin=*';
          // 1) try pageimage thumbnail
          const url = base + '&action=query&titles='+encodeURIComponent(name)+'&prop=pageimages&pithumbsize=500&format=json';
          const res = await fetch(url);
          if(!res.ok) return null;
          const data = await res.json();
          const pages = data.query && data.query.pages;
          if(pages){
            const page = Object.values(pages)[0];
            if(page && page.thumbnail && page.thumbnail.source){
              const thumb = page.thumbnail.source;
              if(/\.png(\?|$)/i.test(thumb)) return thumb; // it's already PNG
              // otherwise continue to search for PNG files on the page
            }
          }

          // 2) list images on the page and prefer PNG
          const imgListUrl = base + '&action=query&titles='+encodeURIComponent(name)+'&prop=images&format=json';
          const res2 = await fetch(imgListUrl);
          if(!res2.ok) return null;
          const data2 = await res2.json();
          const pages2 = data2.query && data2.query.pages;
          if(!pages2) return null;
          const page2 = Object.values(pages2)[0];
          if(page2 && page2.images){
            for(const im of page2.images){
              const title = im.title; // like 'File:Something.png'
              if(/\.png$/i.test(title)){
                // fetch imageinfo for this file
                const infoUrl = base + '&action=query&titles='+encodeURIComponent(title)+'&prop=imageinfo&iiprop=url&format=json';
                const r3 = await fetch(infoUrl);
                if(!r3.ok) continue;
                const d3 = await r3.json();
                const p3 = d3.query && d3.query.pages && Object.values(d3.query.pages)[0];
                if(p3 && p3.imageinfo && p3.imageinfo[0] && p3.imageinfo[0].url) return p3.imageinfo[0].url;
              }
            }
          }

          // 3) fall back to the earlier thumbnail if present
          if(pages){
            const page = Object.values(pages)[0];
            if(page && page.thumbnail && page.thumbnail.source) return page.thumbnail.source;
          }
          return null;
        }catch(e){ return null; }
      }

      function wikiURL(name){
        return 'https://en.wikipedia.org/wiki/' + encodeURIComponent(name.replace(/ /g,'_'));
      }

      // Fun name parts
      const funAdjectives = ['Radiant','Gentle','Mighty','Whispering','Glittering','Silent','Brave','Silly','Noble','Playful','Twinkling','Fiery'];
      const funNouns = ['Destroyer of Darkness','Dancer of Dew','Keeper of Sunlight','Tickler of Bees','Guardian of Mornings','Dreamer of Meadows','Bright Sprout','Joy Bringer','Petal Pirate','Skywatcher'];

      let plantedFlowerCount = 0;
      let flowerIdCounter = 0;
      let pollCount = 0;
      const stage = document.querySelector('.stage');
      const btn = document.getElementById('plantBtn');
      const visitorBees = [];
      const hiveElements = [];
      const wasps = [];

      const beeSettings = {
        minSpeed: 3200,
        maxSpeed: 5200,
        minRest: 5000,
        maxRest: 12000,
        minFlowerWait: 1800,
        maxFlowerWait: 4200
      };

      const weaponChoices = [
        { type: 'axt', label: 'Axt', char: '🪓', damage: 18, range: 24, speed: 3600, suicide: false },
        { type: 'sword', label: 'Sword', char: '⚔️', damage: 12, range: 22, speed: 4200, suicide: false },
        { type: 'spear', label: 'Spear', char: '🗡️', damage: 8, range: 40, speed: 3200, suicide: false },
        { type: 'bomb', label: 'Bomb', char: '💣', damage: 999, range: 80, speed: 3200, suicide: true },
        { type: 'squishy', label: 'Squishy Hammer', char: '🔨', damage: 5, range: 18, speed: 4000, suicide: false }
      ];

      const waspSettings = {
        minSpeed: 3200,
        maxSpeed: 5200,
        minHealth: 36,
        maxHealth: 54,
        minPower: 5,
        maxPower: 9
      };

      let selectedWeapon = null;
      let cursorPosition = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
      const cursorWeapon = document.getElementById('cursorWeapon');

      function initializeWeaponMenu(){
        const menu = document.getElementById('weaponMenu');
        weaponChoices.forEach((weapon, index) => {
          const slot = document.createElement('button');
          slot.type = 'button';
          slot.className = 'weapon-slot';
          slot.dataset.weaponIndex = index;
          slot.innerHTML = `<span>${weapon.char}</span>`;
          slot.title = weapon.label;
          slot.addEventListener('click', () => selectWeapon(index));
          menu.appendChild(slot);
        });
      }

      function selectWeapon(index){
        selectedWeapon = weaponChoices[index];
        document.querySelectorAll('.weapon-slot').forEach((slot, slotIndex) => {
          slot.classList.toggle('selected', slotIndex === index);
        });
        cursorWeapon.textContent = selectedWeapon.char;
        cursorWeapon.classList.toggle('hidden', !selectedWeapon);
      }

      function updateCursorWeapon(){
        cursorWeapon.style.left = cursorPosition.x + 'px';
        cursorWeapon.style.top = cursorPosition.y + 'px';
      }

      document.addEventListener('mousemove', (event) => {
        cursorPosition.x = event.clientX;
        cursorPosition.y = event.clientY + 10;
        updateCursorWeapon();
      });

      document.addEventListener('click', () => {
        tryCursorAttack();
      });

      function tryCursorAttack(){
        if(!selectedWeapon || wasps.length === 0) return;
        const point = { x: cursorPosition.x, y: cursorPosition.y };
        let nearest = null;
        let best = Infinity;
        wasps.forEach(wasp => {
          if(!wasp.isConnected) return;
          const dist = getDistance(point, getEntityCenter(wasp));
          if(dist < best){ best = dist; nearest = wasp; }
        });
        if(!nearest || best > 90) return;
        showAttackEffect(point);
        if(selectedWeapon.type === 'bomb'){
          showExplosion(point, selectedWeapon.range);
          wasps.slice().forEach(candidate => {
            if(!candidate.isConnected) return;
            if(getDistance(point, getEntityCenter(candidate)) <= selectedWeapon.range){
              removeWasp(candidate);
            }
          });
          return;
        }
        const remaining = parseInt(nearest.dataset.health, 10) - selectedWeapon.damage;
        nearest.dataset.health = Math.max(0, remaining).toString();
        if(remaining <= 0) removeWasp(nearest);
      }

      function getButtonCenter(){
        const rect = btn.getBoundingClientRect();
        return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
      }

      function updatePollMeter(delta){
        pollCount = Math.max(0, pollCount + delta);
        document.getElementById('pollCount').textContent = pollCount;
      }

      function playSquishSound(){
        try{
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(120, audioCtx.currentTime);
          gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.25);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.25);
        }catch(e){ }
      }

      function getRandomPlant(){
        const plants = stage.querySelectorAll('.plant');
        return plants.length ? plants[Math.floor(Math.random()*plants.length)] : null;
      }

      function getAvailablePlants(){
        return Array.from(stage.querySelectorAll('.plant')).filter(p => !p.dataset.reservedBy);
      }

      function findPlantById(id){
        return stage.querySelector(`.plant[data-flower-id="${id}"]`);
      }

      function reservePlant(plant, bee){
        if(!plant || plant.dataset.reservedBy) return false;
        plant.dataset.reservedBy = bee.dataset.beeId;
        bee.dataset.targetFlowerId = plant.dataset.flowerId;
        return true;
      }

      function releasePlant(bee){
        if(!bee.dataset.targetFlowerId) return;
        const plant = findPlantById(bee.dataset.targetFlowerId);
        if(plant && plant.dataset.reservedBy === bee.dataset.beeId){
          delete plant.dataset.reservedBy;
        }
        delete bee.dataset.targetFlowerId;
      }

      function randomBeeSpeed(){ return randomInt(beeSettings.minSpeed, beeSettings.maxSpeed); }
      function randomRestDuration(){ return randomInt(beeSettings.minRest, beeSettings.maxRest); }
      function randomFlowerWait(){ return randomInt(beeSettings.minFlowerWait, beeSettings.maxFlowerWait); }

      function getRandomEdgePosition(){
        const edge = Math.floor(Math.random() * 4);
        const padding = 40;
        switch(edge){
          case 0: return { x: -padding, y: randomInt(padding, window.innerHeight - padding) };
          case 1: return { x: window.innerWidth + padding, y: randomInt(padding, window.innerHeight - padding) };
          case 2: return { x: randomInt(padding, window.innerWidth - padding), y: -padding };
          default: return { x: randomInt(padding, window.innerWidth - padding), y: window.innerHeight + padding };
        }
      }

      function getFlowerCenter(plant){
        const rect = plant.getBoundingClientRect();
        return {
          x: rect.left + rect.width / 2,
          y: rect.top + rect.height / 2
        };
      }

      function getHiveCenter(hive){
        const rect = hive.getBoundingClientRect();
        return {
          x: rect.left + rect.width / 2,
          y: rect.top + rect.height / 2
        };
      }

      function chooseBeeSource(){
        if(hiveElements.length === 0) return 'offscreen';
        return Math.random() < 0.5 ? 'hive' : 'offscreen';
      }

      function chooseTargetFlower(bee){
        const available = getAvailablePlants();
        if(available.length === 0) return null;
        const plant = available[Math.floor(Math.random() * available.length)];
        return reservePlant(plant, bee) ? plant : null;
      }

      function getEntityCenter(elm){
        const rect = elm.getBoundingClientRect();
        return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
      }

      function getDistance(a, b){
        const dx = a.x - b.x;
        const dy = a.y - b.y;
        return Math.sqrt(dx * dx + dy * dy);
      }

      function chooseWaspTarget(){
        const targets = [];
        visitorBees.forEach(bee => { if(bee.isConnected) targets.push({ type: 'bee', element: bee }); });
        hiveElements.forEach(hive => { if(hive.isConnected) targets.push({ type: 'hive', element: hive }); });
        if(targets.length === 0) return null;
        return targets[randomInt(0, targets.length - 1)];
      }

      function createWasp(){
        const wasp = document.createElement('div');
        wasp.className = 'wasp';
        wasp.dataset.waspId = `wasp-${Date.now()}-${Math.floor(Math.random() * 10000)}`;
        const speed = randomInt(waspSettings.minSpeed, waspSettings.maxSpeed);
        const health = randomInt(waspSettings.minHealth, waspSettings.maxHealth);
        const power = randomInt(waspSettings.minPower, waspSettings.maxPower);
        wasp.dataset.speed = speed.toString();
        wasp.dataset.health = health.toString();
        wasp.dataset.maxHealth = health.toString();
        wasp.dataset.power = power.toString();
        document.body.appendChild(wasp);
        wasps.push(wasp);
        const start = getRandomEdgePosition();
        wasp.style.left = start.x + 'px';
        wasp.style.top = start.y + 'px';
        moveWaspToTarget(wasp);
      }

      function spawnWasp(){
        createWasp();
      }

      function spawnWaspBatch(count){
        for(let i = 0; i < count; i++) createWasp();
      }

      function moveWaspToTarget(wasp){
        if(!wasp.isConnected) return;
        const target = chooseWaspTarget();
        if(!target || Math.random() < 0.3){
          orbitWaspAroundButton(wasp);
          return;
        }
        const from = getEntityCenter(wasp);
        const to = getEntityCenter(target.element);
        animateBeeFlight(wasp, from, to, parseInt(wasp.dataset.speed, 10), () => {
          applyWaspImpact(wasp, target);
        });
      }

      function orbitWaspAroundButton(wasp){
        if(!wasp.isConnected) return;
        const center = getButtonCenter();
        const angle = Math.random() * Math.PI * 2;
        const radius = 64 + Math.random() * 24;
        const to = {
          x: center.x + Math.cos(angle) * radius,
          y: center.y + Math.sin(angle) * radius
        };
        const from = getEntityCenter(wasp);
        animateBeeFlight(wasp, from, to, parseInt(wasp.dataset.speed, 10), () => {
          if(!wasp.isConnected) return;
          setTimeout(() => { if(wasp.isConnected) moveWaspToTarget(wasp); }, 700 + randomInt(0, 600));
        });
      }

      function updateHiveHealth(hive){
        const max = parseInt(hive.dataset.maxHealth, 10);
        const value = Math.max(0, Math.min(max, parseInt(hive.dataset.health, 10)));
        hive.dataset.health = value.toString();
        const fill = hive.querySelector('.health-fill');
        if(fill){
          const percent = (value / max) * 100;
          fill.style.width = `${percent}%`;
          if(percent < 40){
            fill.style.background = 'linear-gradient(90deg, #f44336, #ff9800)';
          } else if(percent < 70){
            fill.style.background = 'linear-gradient(90deg, #ffeb3b, #8bc34a)';
          } else {
            fill.style.background = 'linear-gradient(90deg, #4caf50, #8bc34a)';
          }
        }
        if(value <= 0) removeHive(hive);
      }

      function removeHive(hive){
        if(!hive.isConnected) return;
        const index = hiveElements.indexOf(hive);
        if(index !== -1) hiveElements.splice(index, 1);
        hive.remove();
      }

      function removeWasp(wasp){
        if(!wasp.isConnected) return;
        const index = wasps.indexOf(wasp);
        if(index !== -1) wasps.splice(index, 1);
        wasp.remove();
      }

      function showAttackEffect(point){
        const pulse = document.createElement('div');
        pulse.className = 'attack-effect';
        pulse.style.left = point.x + 'px';
        pulse.style.top = point.y + 'px';
        document.body.appendChild(pulse);
        pulse.animate([
          { transform: 'translate(-50%, -50%) scale(0.3)', opacity: 1 },
          { transform: 'translate(-50%, -50%) scale(1.4)', opacity: 0 }
        ], { duration: 280, easing: 'ease-out' }).onfinish = () => pulse.remove();
      }

      function showExplosion(point, radius){
        const burst = document.createElement('div');
        burst.className = 'explosion';
        burst.style.left = point.x + 'px';
        burst.style.top = point.y + 'px';
        document.body.appendChild(burst);
        burst.animate([
          { width: '0px', height: '0px', opacity: 0.85 },
          { width: `${radius * 2}px`, height: `${radius * 2}px`, opacity: 0 }
        ], { duration: 420, easing: 'ease-out' }).onfinish = () => burst.remove();
      }

      function findNearestWasp(bee){
        let nearest = null;
        let best = Infinity;
        const source = getEntityCenter(bee);
        wasps.forEach(wasp => {
          if(!wasp.isConnected) return;
          const distance = getDistance(source, getEntityCenter(wasp));
          if(distance < best){ best = distance; nearest = wasp; }
        });
        return nearest;
      }

      function applyWaspImpact(wasp, target){
        if(!wasp.isConnected) return;
        if(!target.element.isConnected){
          setTimeout(() => { if(wasp.isConnected) moveWaspToTarget(wasp); }, 600);
          return;
        }
        const point = getEntityCenter(target.element);
        showAttackEffect(point);
        if(target.type === 'hive'){
          target.element.dataset.health = (parseInt(target.element.dataset.health, 10) - parseInt(wasp.dataset.power, 10)).toString();
          updateHiveHealth(target.element);
        } else if(target.type === 'bee'){
          const remaining = parseInt(target.element.dataset.health, 10) - parseInt(wasp.dataset.power, 10);
          target.element.dataset.health = Math.max(0, remaining).toString();
          if(remaining <= 0) removeBee(target.element);
        }
        if(wasp.isConnected) setTimeout(() => { if(wasp.isConnected) moveWaspToTarget(wasp); }, 900);
      }

      function removeBee(bee){
        if(!bee.isConnected) return;
        releasePlant(bee);
        const idx = visitorBees.indexOf(bee);
        if(idx !== -1) visitorBees.splice(idx, 1);
        bee.remove();
      }

      function startWarriorDefense(bee){
        if(!bee.isConnected) return;
        const hive = hiveElements.length ? getRandomHive() : null;
        const targetWasp = findNearestWasp(bee);
        if(targetWasp){
          const from = getEntityCenter(bee);
          const to = getEntityCenter(targetWasp);
          animateBeeFlight(bee, from, to, parseInt(bee.dataset.weaponSpeed, 10), () => {
            if(!bee.isConnected) return;
            applyWarriorStrike(bee, targetWasp);
            if(bee.isConnected && bee.dataset.weaponSuicide !== '1'){
              returnWarriorHome(bee, hive);
            }
          });
        } else {
          orbitWarriorNearHive(bee, hive);
        }
      }

      function returnWarriorHome(bee, hive){
        if(!bee.isConnected) return;
        const destination = hive ? getEntityCenter(hive) : getButtonCenter();
        animateBeeFlight(bee, getEntityCenter(bee), destination, parseInt(bee.dataset.weaponSpeed, 10), () => {
          if(!bee.isConnected) return;
          setTimeout(() => { if(bee.isConnected) startWarriorDefense(bee); }, 350 + randomInt(0, 300));
        });
      }

      function orbitWarriorNearHive(bee, hive){
        if(!bee.isConnected) return;
        const center = hive ? getEntityCenter(hive) : getButtonCenter();
        const angle = Math.random() * Math.PI * 2;
        const radius = 40 + Math.random() * 28;
        const to = {
          x: center.x + Math.cos(angle) * radius,
          y: center.y + Math.sin(angle) * radius
        };
        animateBeeFlight(bee, getEntityCenter(bee), to, parseInt(bee.dataset.weaponSpeed, 10), () => {
          if(!bee.isConnected) return;
          setTimeout(() => { if(bee.isConnected) startWarriorDefense(bee); }, 700 + randomInt(0, 400));
        });
      }

      function applyWarriorStrike(bee, wasp){
        const weaponType = bee.dataset.weaponType;
        const targetPoint = getEntityCenter(wasp);
        if(weaponType === 'bomb'){
          showExplosion(targetPoint, parseInt(bee.dataset.weaponRange, 10));
          wasps.slice().forEach(candidate => {
            if(!candidate.isConnected) return;
            if(getDistance(targetPoint, getEntityCenter(candidate)) <= parseInt(bee.dataset.weaponRange, 10)){
              removeWasp(candidate);
            }
          });
          removeBee(bee);
          return;
        }
        showAttackEffect(targetPoint);
        if(weaponType === 'squishy') playSquishSound();
        const damage = parseInt(bee.dataset.weaponDamage, 10);
        const remaining = parseInt(wasp.dataset.health, 10) - damage;
        wasp.dataset.health = Math.max(0, remaining).toString();
        if(remaining <= 0) removeWasp(wasp);
      }

      function returnBeeHome(bee, flower){
        const hive = hiveElements.length ? getRandomHive() : null;
        const from = getFlowerCenter(flower);
        const destination = hive ? getEntityCenter(hive) : getRandomEdgePosition();
        animateBeeFlight(bee, from, destination, randomBeeSpeed(), () => {
          if(!bee.isConnected) return;
          if(hive && bee.dataset.kind === 'normal'){
            hive.dataset.health = Math.min(parseInt(hive.dataset.maxHealth, 10), parseInt(hive.dataset.health, 10) + 6).toString();
            updateHiveHealth(hive);
          }
          if(hive) updatePollMeter(1);
          restBee(bee);
        });
      }

      function createVisitorBee(){
        const bee = document.createElement('div');
        bee.className = 'bee';
        const isWarrior = wasps.length > 0 && Math.random() < 0.45;
        if(isWarrior){
          const weapon = weaponChoices[randomInt(0, weaponChoices.length - 1)];
          bee.classList.add('warrior');
          bee.dataset.weaponType = weapon.type;
          bee.dataset.weaponDamage = weapon.damage.toString();
          bee.dataset.weaponRange = weapon.range.toString();
          bee.dataset.weaponSpeed = weapon.speed.toString();
          bee.dataset.weaponSuicide = weapon.suicide ? '1' : '0';
          const icon = document.createElement('span');
          icon.className = 'weapon-icon';
          icon.textContent = weapon.char;
          icon.title = weapon.label;
          bee.appendChild(icon);
        } else {
          bee.dataset.weaponType = 'none';
        }
        bee.dataset.type = 'visitor';
        bee.dataset.beeId = `bee-${Date.now()}-${Math.floor(Math.random() * 10000)}`;
        bee.dataset.kind = isWarrior ? 'warrior' : 'normal';
        const health = isWarrior ? 52 : 60;
        bee.dataset.health = health.toString();
        bee.dataset.maxHealth = health.toString();
        bee.dataset.speed = randomBeeSpeed();
        bee.dataset.restCount = '0';
        bee.dataset.source = chooseBeeSource();
        bee.hidden = isWarrior ? false : true;
        document.body.appendChild(bee);
        visitorBees.push(bee);
        if(isWarrior){
          startWarriorDefense(bee);
        } else {
          startBeeCycle(bee);
        }
      }

      function animateBeeFlight(bee, from, to, duration, onfinish){
        if(!bee.isConnected) return;
        bee.style.left = from.x + 'px';
        bee.style.top = from.y + 'px';
        const rotationStart = from.x <= to.x ? -18 : 18;
        const rotationEnd = from.x <= to.x ? 18 : -18;
        const midX = (from.x + to.x) / 2;
        const midY = (from.y + to.y) / 2;
        const sway = Math.min(24, Math.abs(to.y - from.y) + 8);

        const keyframes = [
          { left: from.x + 'px', top: from.y + 'px', transform: `translate(-50%,-50%) rotate(${rotationStart}deg)` },
          { left: midX + 'px', top: (midY + (from.y < to.y ? -sway : sway)) + 'px', transform: `translate(-50%,-50%) rotate(${rotationStart / 2}deg)` },
          { left: midX + 'px', top: (midY + (from.y < to.y ? sway : -sway)) + 'px', transform: `translate(-50%,-50%) rotate(${rotationEnd / 2}deg)` },
          { left: to.x + 'px', top: to.y + 'px', transform: `translate(-50%,-50%) rotate(${rotationEnd}deg)` }
        ];

        const anim = bee.animate(keyframes, { duration, easing: 'ease-in-out', fill: 'forwards' });
        anim.onfinish = () => {
          bee.style.left = to.x + 'px';
          bee.style.top = to.y + 'px';
          bee.style.transform = `translate(-50%,-50%) rotate(${rotationEnd}deg)`;
          if(typeof onfinish === 'function') onfinish();
        };
      }

      function startBeeCycle(bee){
        if(!bee.isConnected) return;
        releasePlant(bee);
        bee.dataset.source = chooseBeeSource();
        const flower = chooseTargetFlower(bee);
        if(!flower){
          return restBee(bee);
        }

        bee.dataset.restCount = '0';
        bee.hidden = false;
        bee.dataset.speed = randomBeeSpeed();

        const from = bee.dataset.source === 'hive' && hiveElements.length
          ? getHiveCenter(getRandomHive())
          : getRandomEdgePosition();
        const to = getFlowerCenter(flower);

        animateBeeFlight(bee, from, to, parseInt(bee.dataset.speed, 10), () => {
          if(!bee.isConnected) return;
          const waitMs = randomFlowerWait();
          setTimeout(() => {
            if(!bee.isConnected) return;
            returnBeeHome(bee, flower);
          }, waitMs);
        });
      }

      function restBee(bee){
        if(!bee.isConnected) return;
        releasePlant(bee);
        const restCount = Math.min(2, parseInt(bee.dataset.restCount, 10) + 1);
        bee.dataset.restCount = restCount.toString();
        bee.hidden = true;
        bee.getAnimations().forEach(anim => anim.cancel());

        const restMs = randomRestDuration();
        setTimeout(() => {
          if(!bee.isConnected) return;
          if(restCount >= 2){
            return despawnBee(bee);
          }
          bee.hidden = false;
          bee.dataset.speed = randomBeeSpeed();
          bee.dataset.source = chooseBeeSource();
          startBeeCycle(bee);
        }, restMs);
      }

      function despawnBee(bee){
        if(!bee.isConnected) return;
        releasePlant(bee);
        const index = visitorBees.indexOf(bee);
        if(index !== -1) visitorBees.splice(index, 1);
        bee.remove();
      }

      function getRandomHive(){
        return hiveElements[Math.floor(Math.random() * hiveElements.length)];
      }

      function addHive(index){
        if(hiveElements.length >= index) return;
        const buttonRect = btn.getBoundingClientRect();
        const hive = document.createElement('div');
        hive.className = 'hive';
        const hiveImg = document.createElement('img');
        hiveImg.src = 'beehive_PNG1-3198683716.png';
        hiveImg.alt = 'hive';
        hive.appendChild(hiveImg);
        const healthBar = document.createElement('div');
        healthBar.className = 'health-bar';
        const healthFill = document.createElement('div');
        healthFill.className = 'health-fill';
        healthBar.appendChild(healthFill);
        hive.appendChild(healthBar);
        hive.dataset.health = '100';
        hive.dataset.maxHealth = '100';

        const left = buttonRect.left + (index === 1 ? 0 : index === 2 ? 110 : 220);
        const top = buttonRect.bottom + 12;
        hive.style.left = left + 'px';
        hive.style.top = top + 'px';
        if(index === 2) hive.style.transform = 'rotate(6deg)';
        if(index === 3) hive.style.transform = 'rotate(-4deg)';
        document.body.appendChild(hive);
        hiveElements.push(hive);

        for(let i = 0; i < 3; i++){
          const hiveBee = document.createElement('div');
          hiveBee.className = 'hive-bee';
          hive.appendChild(hiveBee);
        }
        startHiveOrbit(hive);
      }

      function startHiveOrbit(hive){
        function tick(now){
          if(!hive.isConnected) return;
          const bees = hive.querySelectorAll('.hive-bee');
          const elapsed = now - (hive.dataset.orbitStart ? parseInt(hive.dataset.orbitStart, 10) : (hive.dataset.orbitStart = Date.now(), parseInt(hive.dataset.orbitStart, 10)));
          bees.forEach((hiveBee, index) => {
            const period = 2600 + index * 250;
            const angle = ((elapsed + index * 120) % period) / period * Math.PI * 2;
            const x = Math.cos(angle) * 28;
            const y = Math.sin(angle) * 14;
            hiveBee.style.left = `${40 + x}px`;
            hiveBee.style.top = `${28 + y}px`;
            hiveBee.classList.toggle('front', Math.sin(angle) > 0);
          });
          requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      }

      function checkBeeEvents(){
        if(plantedFlowerCount > 0 && plantedFlowerCount % 10 === 0){
          createVisitorBee();
          spawnWasp();
        }
        const nextHiveIndex = hiveElements.length + 1;
        if(plantedFlowerCount >= nextHiveIndex * 100 && nextHiveIndex <= 3){
          addHive(nextHiveIndex);
          spawnWaspBatch(5);
          updatePollMeter(5);
        }
      }

      function randomInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

      // Background hill/field images - choose one at random on load
      const backgrounds = [
        'https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1600&q=80',
        'https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=80',
        'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1600&q=80'
      ];
      document.addEventListener('DOMContentLoaded', ()=>{
        const bg = backgrounds[Math.floor(Math.random()*backgrounds.length)];
        document.body.style.backgroundImage = `url(${bg})`;
        document.body.style.backgroundSize = 'cover';
        document.body.style.backgroundPosition = 'center';
        initializeWeaponMenu();
        selectWeapon(0);
      });

      btn.addEventListener('click', ()=>{
        // Spawn a seed from a random X at the top of the viewport
        const seed = document.createElement('div');
        seed.className = 'seed';
        const seedWidth = 18;
        const startX = Math.floor(Math.random() * Math.max(1, (window.innerWidth - seedWidth)));
        const startTop = -24; // start slightly above the viewport
        seed.style.left = startX + 'px';
        seed.style.top = startTop + 'px';
        document.body.appendChild(seed);

        // animate fall to ground (target ~80% viewport height)
        const landY = (window.innerHeight * 0.8) - startTop;
        seed.style.setProperty('--landY', landY + 'px');
        seed.style.transition = 'transform linear';
        seed.style.animation = `fall ${randomInt(900,1400)}ms linear forwards`;

        seed.addEventListener('animationend', ()=>{
          // determine center X of seed and plant there
          const landedX = parseFloat(seed.style.left) || startX;
          const seedCenterX = landedX + (seedWidth/2);
          seed.remove();
          plantAt(seedCenterX);
        }, {once:true});
      });

      function plantAt(x){
        const plant = document.createElement('div');
        plant.className = 'plant';
        // position using percent
        const pct = Math.max(5, Math.min(95, (x / window.innerWidth) * 100));
        plant.style.left = pct + '%';

        const bloom = document.createElement('div'); bloom.className='bloom';
        // choose a random photo and use it as the bloom image element
        const img = document.createElement('img');
        img.className = 'bloom-img';
        img.alt = 'flower';
        bloom.appendChild(img);
        plant.appendChild(bloom);
        stage.appendChild(plant);

        // pick a flower: keep the canonical page title and a display name
        const rawTitle = flowers[Math.floor(Math.random()*flowers.length)];
        const displayName = rawTitle.replace(/_/g,' ');
        plant.dataset.flowerTitle = rawTitle; // canonical title to use in wiki API and link
        plant.dataset.flowerName = displayName; // human-friendly display name
        plant.dataset.flowerId = `flower-${++flowerIdCounter}`;
        plantedFlowerCount += 1;

        // start loading image (prefer PNG if available via wiki)
        const imgEl = img;
        imgEl.src = flowerPNGs[Math.floor(Math.random()*flowerPNGs.length)];
        imgEl.onerror = ()=>{ imgEl.src = flowerPNGs[Math.floor(Math.random()*flowerPNGs.length)]; };
        fetchFlowerThumbnail(rawTitle).then(url=>{ if(url) imgEl.src = url; }).catch(()=>{});

        // create decay overlay now so it can appear later
        const decay = document.createElement('div');
        decay.className = 'decay-overlay';
        bloom.appendChild(decay);

        checkBeeEvents();

        // growth animation duration between 10-25s
        const growSeconds = randomInt(10,25);
        const start = performance.now();
        function tick(now){
          const t = Math.min(1, (now - start) / (growSeconds*1000));
          bloom.style.transform = `scale(${t})`;
          if(imgEl) imgEl.style.transform = `scale(${t})`;
          if(t < 1) requestAnimationFrame(tick);
          else onFullyGrown(plant, decay);
        }
        requestAnimationFrame(tick);
      }

      function onFullyGrown(plant, decay){
        // use the flower title chosen at planting for the link, and display the stored display name
        const pageTitle = plant.dataset.flowerTitle || flowers[Math.floor(Math.random()*flowers.length)];
        const name = plant.dataset.flowerName || pageTitle.replace(/_/g,' ');
        const fun = funAdjectives[Math.floor(Math.random()*funAdjectives.length)] + ' ' + funNouns[Math.floor(Math.random()*funNouns.length)];
        const anchor = document.createElement('a');
        anchor.className = 'flower-name';
        anchor.href = wikiURL(pageTitle);
        anchor.target = '_blank';
        anchor.rel = 'noopener noreferrer';
        // create two rows: title (flower name) and fun name below
        const titleSpan = document.createElement('span'); titleSpan.className = 'title'; titleSpan.textContent = name;
        const funspan = document.createElement('span'); funspan.className = 'fun'; funspan.textContent = fun;
        anchor.appendChild(titleSpan);
        anchor.appendChild(funspan);
        plant.appendChild(anchor);

        // plant lifetime decreases as more plants are present
        const plantCount = Math.max(1, stage.querySelectorAll('.plant').length);
        const lifeSeconds = Math.max(30, 90 - (plantCount - 1) * 4);
        const lifeMs = lifeSeconds * 1000;

        decay.style.transition = `opacity ${lifeMs}ms linear`;
        requestAnimationFrame(()=>{ decay.style.opacity = 0.85; });

        setTimeout(()=>{
          plant.style.transition = 'opacity 1s ease';
          plant.style.opacity = '0';
          setTimeout(()=> plant.remove(), 1000);
        }, lifeMs);
      }

      // Keep layout responsive on resize
      window.addEventListener('resize', ()=>{});
    </script>
  </body>
</html>
